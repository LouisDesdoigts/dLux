name: Documentation
on:
  push:
    branches:
      - main
      - docs-patch
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  documentation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
          python -m pip install zensical mkdocstrings-python
          python -m pip install git+https://github.com/squidfunk/mike.git

      - name: Verify docs environment
        run: |
          python -m pip show zensical mkdocs
          python -c "import zensical, mkdocs; print('Docs deps OK')"
          mike --version

      - name: Build Documentation
        run: |
          DLUX_VERSION="$(python -c 'from importlib.metadata import version; print(version("dLux"))')"
          DLUX_DOCS_SITE_NAME="dLux v${DLUX_VERSION}" zensical build --strict

      - name: Configure Git
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Deploy development documentation
        if: github.ref == 'refs/heads/main'
        run: |
          DLUX_VERSION="$(python -c 'from importlib.metadata import version; print(version("dLux"))')"
          DLUX_DOCS_SITE_NAME="dLux v${DLUX_VERSION}" \
            mike deploy --config-file mkdocs.yml --push dev
          mike set-default --config-file mkdocs.yml --push dev

      - name: Deploy release documentation
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DLUX_DOCS_SITE_NAME="dLux v${VERSION}" \
            mike deploy --config-file mkdocs.yml --push \
              --update-aliases "$VERSION" latest
