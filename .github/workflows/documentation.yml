name: Documentation
on:
  push:
    branches:
      - main
      - docs-patch
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  documentation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
          python -m pip install zensical mkdocstrings-python

      - name: Verify docs environment
        run: |
          python -m pip show zensical mkdocs
          python -c "import zensical, mkdocs; print('Docs deps OK')"

      - name: Build Documentation
        run: |
          DLUX_VERSION="$(python -c 'from importlib.metadata import version; print(version("dLux"))')"
          DLUX_DOCS_SITE_NAME="dLux v${DLUX_VERSION}" zensical build --strict

      - name: Prepare publish directory
        run: |
          rm -rf .publish
          mkdir -p .publish
          cp -R site/. .publish/

          git fetch origin gh-pages:refs/remotes/origin/gh-pages
          git worktree add --detach .gh-pages origin/gh-pages

          CURRENT_VERSION=""
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            CURRENT_VERSION="${GITHUB_REF_NAME#v}"
          fi

          LATEST_VERSION=$(python docs/scripts/generate_versions.py \
            .gh-pages .publish/versions.json "$CURRENT_VERSION")

          # If this is a normal push to main, update the development docs while
          # keeping 'latest' pointed at the newest published release.
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            mkdir -p .publish/dev .publish/latest
            cp -R site/. .publish/dev/
            cp -R ".gh-pages/$LATEST_VERSION/." .publish/latest/
          fi

          # If this is a tag (e.g. v0.5.0), create permanent versioned folders
          # with and without the 'v' prefix for robust backwards compatibility.
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION_TAG=${GITHUB_REF#refs/tags/}
            VERSION=${VERSION_TAG#v}
            mkdir -p ".publish/$VERSION_TAG" ".publish/$VERSION" .publish/latest
            cp -R site/. ".publish/$VERSION_TAG/"
            cp -R site/. ".publish/$VERSION/"
            cp -R site/. .publish/latest/
          fi

      - name: Deploy Documentation
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .publish
          keep_files: true
